<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Login | AI Proctored Exam</title>
  <meta name="description" content="Secure login portal for AI Proctored Examination System with real-time monitoring">
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/128/1828/1828434.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1e40af;
      --primary-light: #3b82f6;
      --primary-dark: #1e3a8a;
      --accent: #0891b2;
      --bg-dark: #0a0e1a;
      --bg-card: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.08);
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --danger: #ef4444;
      --success: #10b981;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      overflow: hidden;
      position: relative;
    }

    /* Animated Background */
    .bg-gradient {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(30, 64, 175, 0.3), transparent),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(8, 145, 178, 0.18), transparent),
        radial-gradient(ellipse 50% 50% at 20% 90%, rgba(14, 116, 144, 0.12), transparent);
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(99, 102, 241, 0.4);
      border-radius: 50%;
      animation: floatParticle linear infinite;
    }

    @keyframes floatParticle {
      0% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        transform: translateY(-10vh) rotate(720deg);
        opacity: 0;
      }
    }

    /* Grid lines */
    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(30, 64, 175, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30, 64, 175, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Login Card */
    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }

    .card {
      background: var(--bg-card);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px 40px;
      position: relative;
      overflow: hidden;
      animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(30, 64, 175, 0.6), rgba(8, 145, 178, 0.5), transparent);
    }

    @keyframes cardEntrance {
      0% {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Logo */
    .logo-wrapper {
      width: 64px;
      height: 64px;
      margin: 0 auto 28px;
      border-radius: 18px;
      background: linear-gradient(135deg, #1e40af, #0891b2);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(30, 64, 175, 0.35);
      animation: logoPulse 3s ease-in-out infinite;
    }

    @keyframes logoPulse {

      0%,
      100% {
        box-shadow: 0 0 30px rgba(30, 64, 175, 0.35);
      }

      50% {
        box-shadow: 0 0 50px rgba(30, 64, 175, 0.55);
      }
    }

    .logo-wrapper svg {
      width: 32px;
      height: 32px;
      fill: white;
    }

    h1 {
      text-align: center;
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 36px;
    }

    /* Inputs */
    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group .icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      transition: color 0.3s;
      pointer-events: none;
    }

    .input-group .icon svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
    }

    input {
      width: 100%;
      padding: 16px 16px 16px 48px;
      border-radius: 14px;
      border: 1.5px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
      outline: none;
    }

    input::placeholder {
      color: var(--text-muted);
    }

    input:focus {
      border-color: var(--primary-light);
      background: rgba(30, 64, 175, 0.08);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
    }

    input:focus~.icon {
      color: var(--primary-light);
    }

    /* Button */
    .btn-primary {
      width: 100%;
      margin-top: 8px;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      letter-spacing: 0.3px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(30, 64, 175, 0.45);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 30%, rgba(255, 255, 255, 0.1) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }

    .btn-primary:hover::after {
      transform: translateX(100%);
    }

    .btn-primary.loading {
      pointer-events: none;
      opacity: 0.8;
    }

    .btn-primary .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }

    .btn-primary.loading .btn-text {
      display: none;
    }

    .btn-primary.loading .spinner {
      display: block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Security Badge */
    .security-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(16, 185, 129, 0.08);
      border: 1px solid rgba(16, 185, 129, 0.15);
    }

    .security-badge svg {
      width: 16px;
      height: 16px;
      stroke: var(--success);
      fill: none;
      stroke-width: 2;
    }

    .security-badge span {
      color: var(--success);
      font-size: 12px;
      font-weight: 500;
    }

    /* Error Message */
    .error-msg {
      color: var(--danger);
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      opacity: 0;
      transform: translateY(-5px);
      transition: all 0.3s;
    }

    .error-msg.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* Footer & Toast */
    .footer {
      text-align: center;
      margin-top: 24px;
      color: var(--text-muted);
      font-size: 12px;
    }

    .toast {
      position: fixed;
      top: 24px;
      right: 24px;
      padding: 16px 24px;
      border-radius: 14px;
      background: rgba(239, 68, 68, 0.15);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #fca5a5;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      z-index: 1000;
      transform: translateX(120%);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .toast.show {
      transform: translateX(0);
    }

    @media (max-width: 480px) {
      .card {
        padding: 36px 28px 32px;
        border-radius: 20px;
      }

      h1 {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>

  <div class="bg-gradient"></div>
  <div class="grid-overlay"></div>
  <div class="particles" id="particles"></div>

  <div id="toast" class="toast"></div>

  <div class="login-container">
    <div class="card">
      <div class="logo-wrapper">
        <svg viewBox="0 0 24 24" fill="white">
          <path
            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" />
        </svg>
      </div>

      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to your AI Proctored Exam</p>

      <div class="input-group">
        <input id="username" type="text" placeholder="Enter your name" autocomplete="off" required>
        <span class="icon">
          <svg viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        </span>
      </div>

      <div class="input-group">
        <input id="examId" type="text" placeholder="Enter Exam ID" autocomplete="off" required>
        <span class="icon">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
        </span>
      </div>

      <div id="errorMsg" class="error-msg">Please fill in all fields</div>

      <button id="loginBtn" class="btn-primary" onclick="login()">
        <span class="btn-text">Start Exam</span>
        <div class="spinner"></div>
      </button>

      <div class="security-badge">
        <svg viewBox="0 0 24 24">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        </svg>
        <span>Secured with AI Proctoring</span>
      </div>
    </div>

    <p class="footer">AI Proctored Examination System &copy; 2026</p>
  </div>

  <script>
    // Generate floating particles
    (function () {
      const container = document.getElementById('particles');
      for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (8 + Math.random() * 12) + 's';
        p.style.animationDelay = (Math.random() * 10) + 's';
        p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
        p.style.background = Math.random() > 0.5
          ? 'rgba(30, 64, 175, 0.5)'
          : 'rgba(8, 145, 178, 0.35)';
        container.appendChild(p);
      }
    })();

    // Enter key support
    document.querySelectorAll('input').forEach(input => {
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') login();
      });
    });

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    async function login() {
      const username = document.getElementById("username").value.trim();
      const examId = document.getElementById("examId").value.trim();
      const errorMsg = document.getElementById("errorMsg");
      const btn = document.getElementById("loginBtn");

      if (!username || !examId) {
        errorMsg.classList.add("show");
        if (!username) document.getElementById("username").focus();
        else document.getElementById("examId").focus();
        setTimeout(() => errorMsg.classList.remove("show"), 3000);
        return;
      }

      errorMsg.classList.remove("show");
      btn.classList.add("loading");

      try {
        localStorage.setItem("user_id", username);
        localStorage.setItem("exam_id", examId);

        await fetch(
          `https://ai-proctored-exam-backend.onrender.com/user-login?user_id=${username}&exam_id=${examId}`,
          { method: "POST" }
        );

        window.location.href = "index.html";
      } catch (err) {
        btn.classList.remove("loading");
        showToast("Connection failed. Please try again.");
      }
    }
  </script>

</body>

</html>
